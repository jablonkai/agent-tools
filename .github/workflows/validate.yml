name: Validate Repository Assets

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'agents/**'
      - '.github/scripts/**'
      - '.github/workflows/**'
      - 'README.md'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository validation
        run: bash .github/scripts/validate.sh